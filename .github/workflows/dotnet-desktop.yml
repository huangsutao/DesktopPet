name: .NET Desktop

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore
      run: dotnet restore DesktopPet.sln

    - name: Build
      run: dotnet build DesktopPet.sln --configuration Release --no-restore

  # 仅在推送 v* 标签时：自包含发布 → zip → 挂到 GitHub Release
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Publish (win-x64 self-contained)
      run: >
        dotnet publish DesktopPet.csproj
        -c Release
        -r win-x64
        --self-contained true
        -o publish/win-x64

    - name: Zip
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $zip = "DesktopPet-${tag}-win-x64.zip"
        Compress-Archive -Path publish/win-x64/* -DestinationPath $zip -Force
        echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV

    - name: Upload GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.ZIP_NAME }}
        generate_release_notes: true
        body: |
          Windows x64 便携包（自包含 .NET，无需单独安装运行时）。

          解压后运行 `DesktopPet.exe`。

          > 示例素材来自 Spine 官方示例，多数禁止商业用途；详见仓库 README / License。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
